apiVersion: batch/v1
kind: Job
metadata:
  name: team-b-job-mig-1g10gb
  namespace: team-b
  labels:
    kueue.x-k8s.io/queue-name: team-b-lq
    kueue.x-k8s.io/priority-class: low-priority
spec:
  # Timeout includes CIFAR-10 dataset download (~170MB) on first run
  activeDeadlineSeconds: 900
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: team-b-job-mig-1g10gb
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: training
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          command: ["python", "-u", "-c"]
          args:
            - |
              import torch, torch.nn as nn, torch.optim as optim
              import torchvision, torchvision.transforms as T
              import time

              torch.manual_seed(7)
              print("=" * 60)
              print("  Team B — MIG 1g.10gb — Small CNN CIFAR-10")
              print(f"  Device: {torch.cuda.get_device_name(0)}")
              print("=" * 60)

              tfm = T.Compose([T.ToTensor(), T.Normalize((0.4914,0.4822,0.4465),(0.2023,0.1994,0.2010))])
              ds = torchvision.datasets.CIFAR10('/tmp/data', train=True, download=True, transform=tfm)
              loader = torch.utils.data.DataLoader(ds, batch_size=64, shuffle=True, num_workers=0)

              # Small CNN suitable for 1g.10gb (10GB VRAM)
              model = nn.Sequential(
                  nn.Conv2d(3,32,3,padding=1), nn.ReLU(), nn.MaxPool2d(2),
                  nn.Conv2d(32,64,3,padding=1), nn.ReLU(), nn.MaxPool2d(2),
                  nn.Conv2d(64,128,3,padding=1), nn.ReLU(), nn.AdaptiveAvgPool2d(1),
                  nn.Flatten(), nn.Linear(128,10)
              ).cuda()

              crit = nn.CrossEntropyLoss()
              opt = optim.Adam(model.parameters(), lr=1e-3)

              for ep in range(30):
                  model.train(); loss_sum = correct = total = 0; t0 = time.time()
                  for x, y in loader:
                      x, y = x.cuda(), y.cuda()
                      opt.zero_grad(); out = model(x); loss = crit(out, y)
                      loss.backward(); opt.step()
                      loss_sum += loss.item(); correct += out.max(1)[1].eq(y).sum().item(); total += y.size(0)
                  print(f"Epoch {ep+1:3d}/30 | Loss {loss_sum/len(loader):.4f} | Acc {100*correct/total:.1f}% | {time.time()-t0:.1f}s")
              print("Training complete!")
          resources:
            requests:
              nvidia.com/mig-1g.10gb: 1
            limits:
              nvidia.com/mig-1g.10gb: 1
