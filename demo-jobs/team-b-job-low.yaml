apiVersion: batch/v1
kind: Job
metadata:
  name: team-b-job-low
  namespace: team-b
  labels:
    kueue.x-k8s.io/queue-name: team-b-lq
    kueue.x-k8s.io/priority-class: low-priority
spec:
  # Requires 2 GPUs — use ND-series (8 GPUs) or NC80 (2 GPUs). Won't fit on NC40 (1 GPU).
  # Timeout includes CIFAR-10 dataset download (~170MB) on first run
  activeDeadlineSeconds: 900
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: team-b-job-low
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: training
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          command: ["python", "-u", "-c"]
          args:
            - |
              import torch, torch.nn as nn, torch.optim as optim
              import torchvision, torchvision.transforms as T
              import time

              torch.manual_seed(7)
              torch.backends.cudnn.benchmark = True
              N = torch.cuda.device_count()

              print("=" * 60)
              print("  Team B — Low Priority — VGG-11 CIFAR-10")
              print(f"  GPUs: {N} | Batch: 64 | Optimizer: SGD")
              for i in range(N):
                  print(f"  [{i}] {torch.cuda.get_device_name(i)}")
              print("=" * 60)

              tfm = T.Compose([T.RandomCrop(32, padding=4), T.RandomHorizontalFlip(),
                  T.ToTensor(), T.Normalize((0.4914,0.4822,0.4465),(0.2023,0.1994,0.2010))])
              ds = torchvision.datasets.CIFAR10('/tmp/data', train=True, download=True, transform=tfm)
              loader = torch.utils.data.DataLoader(ds, batch_size=64, shuffle=True, num_workers=0)

              model = torchvision.models.vgg11(num_classes=10).cuda()
              if N > 1: model = nn.DataParallel(model)

              crit = nn.CrossEntropyLoss()
              opt = optim.SGD(model.parameters(), lr=0.05, momentum=0.9, weight_decay=5e-4)
              sched = optim.lr_scheduler.StepLR(opt, step_size=30, gamma=0.1)

              for ep in range(150):
                  model.train(); loss_sum = correct = total = 0; t0 = time.time()
                  for x, y in loader:
                      x, y = x.cuda(), y.cuda()
                      opt.zero_grad(); out = model(x); loss = crit(out, y)
                      loss.backward(); opt.step()
                      loss_sum += loss.item(); correct += out.max(1)[1].eq(y).sum().item(); total += y.size(0)
                  sched.step()
                  print(f"Epoch {ep+1:3d}/150 | Loss {loss_sum/len(loader):.4f} | Acc {100*correct/total:.1f}% | {time.time()-t0:.1f}s")
              print("Training complete!")
          resources:
            requests:
              nvidia.com/gpu: 2
            limits:
              nvidia.com/gpu: 2
